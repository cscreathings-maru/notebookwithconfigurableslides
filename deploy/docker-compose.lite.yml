# NotebookLLM-Lite — single-tenant demo stack (no auth, OpenRouter LLM).
#
# Differences from the full SaaS docker-compose.yml:
#   - no OIDC/Keycloak, no per-tenant auth (LITE_MODE=true)
#   - no Ollama; embeddings use OpenAI (OpenRouter has no embeddings endpoint)
#   - one-shot `init` runs DB migrations + seeds the default workspace
#   - Traefik path-routes frontend (/) and API (/api) on a single local port
#
# Usage:
#   cp deploy/.env.lite.example deploy/.env.lite   # then fill in keys
#   docker compose -f deploy/docker-compose.lite.yml --env-file deploy/.env.lite up -d --build
# Open http://localhost:8080

name: notebookllm-lite

networks:
  edge:
  appnet:

volumes:
  pg_data:
  surreal_data:
  minio_data:
  notebook_data:
  presenton_data:

services:
  traefik:
    image: traefik:v3
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "127.0.0.1:8080:80"      # open http://localhost:8080
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks: [edge]

  # One-shot: apply migrations then seed the default tenant/admin, then exit.
  init:
    build: ../backend
    command: ["sh", "-c", "alembic upgrade head && python -m scripts.seed_lite"]
    env_file: .env.lite
    depends_on: [postgres]
    networks: [appnet]
    restart: "no"

  frontend:
    build:
      context: ../frontend
      args:
        - NEXT_PUBLIC_DEV_MODE=false
        - NEXT_PUBLIC_LITE_MODE=${NEXT_PUBLIC_LITE_MODE:-true}
        - NEXT_PUBLIC_DEFAULT_TENANT_NAME=${NEXT_PUBLIC_DEFAULT_TENANT_NAME:-Demo Workspace}
    env_file: .env.lite
    depends_on: [orchestrator]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # This service is on two networks; tell Traefik to route via edge (where it
      # lives) or it may pick the appnet IP it can't reach -> 504 timeouts.
      - "traefik.docker.network=notebookllm-lite_edge"
    networks: [edge, appnet]

  orchestrator:
    build: ../backend
    env_file: .env.lite
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.docker.network=notebookllm-lite_edge"
    networks: [edge, appnet]

  worker:
    build: ../backend
    command: ["arq", "src.workers.WorkerSettings"]
    env_file: .env.lite
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks: [appnet]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: ["pg_data:/var/lib/postgresql/data"]
    networks: [appnet]
    restart: always

  redis:
    image: redis:7
    networks: [appnet]
    restart: always

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes: ["minio_data:/data"]
    networks: [appnet]
    restart: always
    # Uncomment to reach the MinIO console at http://localhost:9001
    # ports: ["127.0.0.1:9001:9001"]

  # --- Internal engines ------------------------------------------------------
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --user ${SURREAL_USER} --pass ${SURREAL_PASSWORD} rocksdb:/mydata/db.db
    user: root
    volumes: ["surreal_data:/mydata"]
    networks: [appnet]
    restart: always

  open-notebook:
    image: lfnovo/open_notebook:v1-latest
    environment:
      OPEN_NOTEBOOK_ENCRYPTION_KEY: ${OPEN_NOTEBOOK_ENCRYPTION_KEY}
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_USER: ${SURREAL_USER}
      SURREAL_PASSWORD: ${SURREAL_PASSWORD}
      SURREAL_NAMESPACE: ${SURREAL_NAMESPACE}
      SURREAL_DATABASE: ${SURREAL_DATABASE}
      # Analysis LLM is passed per-request by the orchestrator (OpenRouter).
      # Embeddings need their own provider — OpenRouter has none, so use OpenAI:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
    volumes: ["notebook_data:/app/data"]
    depends_on: [surrealdb]
    networks: [appnet]
    restart: always
    # First run only — expose the UI to confirm the embedding provider/model:
    # ports: ["127.0.0.1:8502:8502", "127.0.0.1:5055:5055"]

  presenton:
    image: ghcr.io/presenton/presenton:latest
    environment:
      LLM: "custom"                          # OpenAI-compatible → OpenRouter
      CUSTOM_LLM_URL: ${OPENROUTER_BASE_URL}
      CUSTOM_LLM_API_KEY: ${OPENROUTER_API_KEY}
      CUSTOM_MODEL: ${OPENROUTER_MODEL}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER}
      PEXELS_API_KEY: ${PEXELS_API_KEY}
      CAN_CHANGE_KEYS: ${PRESENTON_CAN_CHANGE_KEYS}
      AUTH_USERNAME: ${PRESENTON_AUTH_USERNAME}
      AUTH_PASSWORD: ${PRESENTON_AUTH_PASSWORD}
    volumes: ["presenton_data:/app_data"]
    networks: [appnet]
    restart: always
